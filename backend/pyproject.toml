[tool.ruff]
line-length = 120
target-version = "py310"
select = ["E", "F", "W", "I", "UP", "B", "C4", "SIM"]
ignore = ["E501", "B008"]
exclude = [
    ".venv",
    "venv",
    "__pycache__",
    "chroma_db",
    "migrations",
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
python_version = "3.10"
warn_return_any = false
warn_unused_configs = true
disallow_untyped_defs = false
ignore_missing_imports = true
exclude = [
    "\\.venv",
    "venv",
    "chroma_db",
]
